<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  /* 影片浮水印用：橫向、簡潔、半透明也清楚 */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 22px;
    padding: 34px 46px;
    font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
    white-space: nowrap;
  }
  .mark { flex: none; }
  .text { line-height: 1; }
  .vic { color: #2d1a0e; font-weight: 700; font-size: 76px; letter-spacing: -1px; }
  .studio { color: #B76E79; font-weight: 400; font-size: 76px; letter-spacing: 0.5px; }
  .sub {
    margin-top: 10px;
    font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    font-size: 21px; letter-spacing: 4px; color: #9b6b4a; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="logo" id="logo">
    <svg class="mark" width="78" height="78" viewBox="0 0 78 78" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#D4A574"/>
          <stop offset="100%" stop-color="#B76E79"/>
        </linearGradient>
      </defs>
      <!-- 指甲形狀：底直、頂圓弧 -->
      <path d="M26 66 Q25 22 39 14 Q53 22 52 66 Z" fill="url(#g)"/>
      <!-- 月牙底緣 -->
      <path d="M26 64 Q39 58 52 64 L52 66 Q39 60 26 66 Z" fill="#fff" opacity="0.55"/>
      <!-- 高光 -->
      <ellipse cx="34" cy="32" rx="4.5" ry="12" fill="#fff" opacity="0.5"/>
    </svg>
    <div class="text">
      <div><span class="vic">VicNail</span> <span class="studio">Studio</span></div>
      <div class="sub">凝膠美甲 · 延甲 · 彩繪教學</div>
    </div>
  </div>
</body>
</html>
