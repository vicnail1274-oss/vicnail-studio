<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: linear-gradient(135deg, #fdf6f0 0%, #f6e4d8 60%, #f0d9c8 100%);
    font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
    display: flex; align-items: center;
  }
  .accent { position: absolute; left: 0; top: 0; width: 16px; height: 100%; background: linear-gradient(#D4A574, #B76E79); }
  .content { padding: 0 96px; z-index: 2; }
  .brand { display: flex; align-items: center; gap: 34px; }
  .name .vic { color: #2d1a0e; font-weight: 700; font-size: 96px; letter-spacing: -1px; }
  .name .studio { color: #B76E79; font-weight: 400; font-size: 96px; }
  .slogan { font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif; font-size: 38px; color: #6b4226; letter-spacing: 8px; margin-top: 30px; font-weight: 500; }
  .url { font-family: Arial, sans-serif; font-size: 27px; color: #9b6b4a; margin-top: 48px; letter-spacing: 3px; }
  .deco { position: absolute; right: -120px; top: 50%; transform: translateY(-50%); opacity: 0.1; }
</style>
</head>
<body>
  <div class="accent"></div>
  <div class="content">
    <div class="brand">
      <svg width="150" height="150" viewBox="0 0 150 150" fill="none">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D4A574"/><stop offset="100%" stop-color="#B76E79"/></linearGradient></defs>
        <circle cx="75" cy="75" r="68" fill="none" stroke="url(#g)" stroke-width="4"/>
        <text x="75" y="104" font-family="Georgia, serif" font-size="88" font-weight="700" fill="url(#g)" text-anchor="middle">V</text>
      </svg>
      <div class="name"><span class="vic">VicNail</span> <span class="studio">Studio</span></div>
    </div>
    <div class="slogan">日系凝膠美甲・延甲・彩繪　專業教學</div>
    <div class="url">vicnail-studio.com</div>
  </div>
  <svg class="deco" width="520" height="520" viewBox="0 0 150 150" fill="none">
    <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D4A574"/><stop offset="100%" stop-color="#B76E79"/></linearGradient></defs>
    <circle cx="75" cy="75" r="68" fill="none" stroke="url(#g2)" stroke-width="4"/>
    <text x="75" y="104" font-family="Georgia, serif" font-size="88" font-weight="700" fill="url(#g2)" text-anchor="middle">V</text>
  </svg>
</body>
</html>
